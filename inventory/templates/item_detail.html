{% load inventory_filters %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item detail</title>
</head>
<body>
<h1>{{ item.name }}</h1>
<p><strong>Description:</strong> {{ item.description }}<br />
<p><strong>Location:</strong> {{ item.location }} - {{ item.location_detail }}<br />
<p></p>
<p><strong>In stock?</strong> {{ item.in_stock|iconbool }}</p>

</body>
</html>
